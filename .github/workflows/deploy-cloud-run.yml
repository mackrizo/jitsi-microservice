name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: visiodoc-prod
  REGION: europe-west1
  SERVICE: jitsi-ms
  IMAGE: europe-west1-docker.pkg.dev/visiodoc-prod/visiodoc-ms/jitsi-ms

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm test

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker
        run: gcloud auth configure-docker europe-west1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build \
            -t ${{ env.IMAGE }}:${{ github.sha }} \
            -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:${{ github.sha }}
          docker push ${{ env.IMAGE }}:latest

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --service-account ${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --set-env-vars "JITSI_MODE=${{ vars.JITSI_MODE }},NODE_ENV=production,JITSI_PUBLIC_URL=https://meet.jit.si,JITSI_PRIVATE_URL=https://jitsi.visiodoc.online,JITSI_APP_ID=visiodoc,JAAS_APP_ID=${{ vars.JAAS_APP_ID }},JAAS_API_KEY_ID=default" \
            --set-secrets "API_KEY=JITSI_MS_API_KEY:latest,JITSI_APP_SECRET=JITSI_APP_SECRET:latest,JAAS_PRIVATE_KEY=JAAS_PRIVATE_KEY:latest" \
            --min-instances 0 \
            --max-instances 10 \
            --memory 256Mi \
            --cpu 1 \
            --region europe-west1 \
            --quiet

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          curl -sf "${URL}/health" || exit 1
          echo "Deployed at ${URL}"
